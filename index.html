<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WAYNE • Loading</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Three.js for background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            background: #0a042e;
        }

        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .loader-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        .loader-logo {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #30e9ff, #a5b4ff, #30e9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        .loader-subtitle {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 3px;
            margin-top: 10px;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(48, 233, 255, 0.2);
            border-top-color: #30e9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 40px;
        }

        .loader-dots {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .loader-dots span {
            width: 8px;
            height: 8px;
            background: #30e9ff;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(48, 233, 255, 0.5)); }
            to { filter: drop-shadow(0 0 30px rgba(48, 233, 255, 0.8)); }
        }
    </style>
</head>
<body>
    <!-- Three.js Background -->
    <canvas id="canvas-bg"></canvas>

    <div class="loader-container">
        <div class="loader-logo">WAYNE</div>
        <div class="loader-subtitle">SOCIAL</div>
        <div class="loader-spinner"></div>
        <div class="loader-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <script>
        // =====================================================
        // THREE.JS BACKGROUND ANIMATION
        // =====================================================

        const canvas = document.getElementById('canvas-bg');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Create particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 700;
        const posArray = new Float32Array(particlesCount * 3);

        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 5;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.02,
            color: 0x30e9ff,
            transparent: true,
            opacity: 0.8,
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        camera.position.z = 1;

        // Mouse interaction
        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (event) => {
            mouseX = event.clientX / window.innerWidth - 0.5;
            mouseY = event.clientY / window.innerHeight - 0.5;
        });

        // Animation
        const clock = new THREE.Clock();

        function animate() {
            const elapsedTime = clock.getElapsedTime();

            particlesMesh.rotation.y = elapsedTime * 0.05;
            particlesMesh.rotation.x = elapsedTime * 0.02;

            // Mouse interaction
            particlesMesh.rotation.x += mouseY * 0.1;
            particlesMesh.rotation.y += mouseX * 0.1;

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // =====================================================
        // REDIRECT TO MAIN PAGE
        // =====================================================

        setTimeout(() => {
            window.location.href = 'main/main.html';
        }, 3000);
    </script>
</body>
</html>
