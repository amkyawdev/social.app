<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WAYNE • Social Community</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Three.js Background -->
    <canvas id="canvas-bg"></canvas>

    <div id="app">
        <!-- Tiny Header -->
        <div class="tiny-header">
            <div class="header-left">
                <h1>WAYNE</h1>
                <span>social</span>
            </div>
            <div class="header-right">
                <button class="hamburger-icon" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
                <button class="hamburger-icon" onclick="showSearch()"><i class="fas fa-search"></i></button>
                <button class="hamburger-icon" onclick="showNotifications()" style="position: relative;">
                    <i class="fas fa-bell"></i>
                    <span id="notificationBadge" class="notification-badge" style="display: none;">0</span>
                </button>
                <button class="hamburger-icon" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <!-- Desktop Menubar -->
        <div class="desktop-menubar">
            <div class="menubar-items">
                <div class="menubar-item active" onclick="showSection('feed')">
                    <i class="fas fa-rss"></i> News Feed
                </div>
                <div class="menubar-item" onclick="showSection('friends')">
                    <i class="fas fa-user-friends"></i> Friends
                </div>
                <div class="menubar-item" onclick="showSection('groups')">
                    <i class="fas fa-users"></i> Groups
                </div>
                <div class="menubar-item" onclick="showSection('chat')">
                    <i class="fas fa-comment"></i> Chat
                </div>
                <div class="menubar-item" onclick="showSection('profile')">
                    <i class="fas fa-user"></i> Profile
                </div>
            </div>
        </div>

        <!-- Mobile Bottom Nav -->
        <div class="mobile-bottom-nav">
            <button class="mobile-nav-item active" onclick="showSection('feed')">
                <i class="fas fa-rss"></i>
                <span>Feed</span>
            </button>
            <button class="mobile-nav-item" onclick="showSection('friends')">
                <i class="fas fa-user-friends"></i>
                <span>Friends</span>
            </button>
            <button class="mobile-nav-item" onclick="showSection('groups')">
                <i class="fas fa-users"></i>
                <span>Groups</span>
            </button>
            <button class="mobile-nav-item" onclick="showSection('chat')">
                <i class="fas fa-comment"></i>
                <span>Chat</span>
            </button>
            <button class="mobile-nav-item" onclick="showSection('profile')">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Search Section -->
            <div id="searchSection" class="section-page hidden">
                <div class="page-title-tiny">
                    <i class="fas fa-search"></i> SEARCH
                </div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search users, posts, groups...">
                    <button onclick="performSearch()"><i class="fas fa-search"></i></button>
                </div>
                <div id="searchResults"></div>
            </div>

            <!-- Feed Section -->
            <div id="feedSection" class="section-page">
                <div class="page-title-tiny">
                    <i class="fas fa-rss"></i> NEWS FEED
                </div>

                <!-- Upload Post -->
                <div class="upload-tiny">
                    <input type="text" placeholder="What's on your mind?" id="postInput">
                    <div class="upload-actions">
                        <button class="hamburger-icon" onclick="triggerImageUpload()" title="Add image">
                            <i class="fas fa-image"></i>
                        </button>
                        <button class="hamburger-icon" onclick="showPostOptions()" title="More options">
                            <i class="fas fa-ellipsis-h"></i>
                        </button>
                        <button class="upload-btn" onclick="uploadPost()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>

                <!-- Post Options Menu -->
                <div id="postOptionsMenu" class="post-options-menu" style="display: none;">
                    <div onclick="triggerImageUpload()"><i class="fas fa-image"></i> Add Image</div>
                    <div onclick="showEmojiPicker()"><i class="fas fa-smile"></i> Add Emoji</div>
                    <div onclick="triggerFileUpload()"><i class="fas fa-file"></i> Add File</div>
                    <div onclick="addLocation()"><i class="fas fa-map-marker-alt"></i> Add Location</div>
                </div>

                <!-- Hidden file input -->
                <input type="file" id="imageInput" accept="image/*" style="display: none;">

                <!-- Image Preview -->
                <div id="imagePreview" class="image-preview" style="display: none;">
                    <img id="previewImg">
                    <button onclick="removeImage()"><i class="fas fa-times"></i></button>
                </div>

                <div id="postsContainer"></div>
            </div>

            <!-- Friends Section -->
            <div id="friendsSection" class="section-page hidden">
                <div class="page-title-tiny">
                    <i class="fas fa-user-friends"></i> FRIENDS
                </div>
                <div id="friendsContainer" class="grid-mini"></div>
            </div>

            <!-- Groups Section -->
            <div id="groupsSection" class="section-page hidden">
                <div class="page-title-tiny">
                    <i class="fas fa-users"></i> GROUPS
                </div>
                
                <button class="upload-btn" style="width: 100%; margin-bottom: 20px; height: 48px;" onclick="showCreateGroupModal()">
                    <i class="fas fa-plus-circle"></i> Create New Group
                </button>
                
                <div id="groupsContainer" class="grid-mini"></div>
            </div>

            <!-- Create Group Modal -->
            <div id="createGroupModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Create New Group</h2>
                        <button class="modal-close" onclick="hideCreateGroupModal()">&times;</button>
                    </div>
                    
                    <div class="current-avatar" id="groupAvatarPreview">
                        <i class="fas fa-users"></i>
                    </div>
                    
                    <div class="avatar-selector" id="groupAvatarSelector"></div>
                    
                    <div style="margin-bottom: 15px;">
                        <label style="color: var(--text-soft);">Group Name</label>
                        <input type="text" id="newGroupName" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: var(--radius-full); color: white; margin-top: 5px;">
                    </div>
                    
                    <div style="margin-bottom: 15px;">
                        <label style="color: var(--text-soft);">Description</label>
                        <textarea id="newGroupDescription" rows="3" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: var(--radius-lg); color: white; margin-top: 5px;"></textarea>
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <label style="color: var(--text-soft);">Privacy</label>
                        <div style="display: flex; gap: 20px; margin-top: 10px;">
                            <label style="color: white;"><input type="radio" name="groupPrivacy" value="public" checked> Public</label>
                            <label style="color: white;"><input type="radio" name="groupPrivacy" value="private"> Private</label>
                        </div>
                    </div>
                    
                    <button class="upload-btn" style="width: 100%; height: 48px;" onclick="createGroup()">
                        <i class="fas fa-users"></i> Create Group
                    </button>
                </div>
            </div>

            <!-- Group Detail Section -->
            <div id="groupDetailSection" class="section-page hidden">
                <div class="page-title-tiny">
                    <i class="fas fa-arrow-left hamburger-icon" onclick="showSection('groups')" style="cursor: pointer;"></i>
                    <span id="groupDetailName">GROUP DETAIL</span>
                </div>
                <div id="groupDetailContainer"></div>
            </div>

            <!-- Chat Section -->
            <div id="chatSection" class="section-page hidden">
                <div class="page-title-tiny">
                    <i class="fas fa-comment"></i> CHAT
                </div>
                
                <!-- Chat Users List -->
                <div id="chatUsersList" class="grid-mini"></div>
                
                <!-- Chat Box -->
                <div id="chatBox" style="display: none;">
                    <div class="chat-container">
                        <div class="chat-header">
                            <button class="chat-back-btn" onclick="hideChatBox()">
                                <i class="fas fa-arrow-left"></i>
                            </button>
                            <div class="chat-user-info" id="chatUserInfo"></div>
                            <div class="chat-actions">
                                <button class="chat-action-btn" onclick="startVideoCall()">
                                    <i class="fas fa-video"></i>
                                </button>
                                <button class="chat-action-btn" onclick="blockUser()">
                                    <i class="fas fa-ban"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="chat-messages" id="chatMessages"></div>
                        
                        <div class="chat-footer">
                            <div class="chat-input-wrapper">
                                <input type="text" class="chat-input" id="chatMessageInput" placeholder="Type a message...">
                                <input type="file" id="chatImageInput" accept="image/*" style="display: none;">
                                <button class="chat-attach-btn" onclick="triggerChatImageUpload()">
                                    <i class="fas fa-image"></i>
                                </button>
                                <button class="chat-send-btn" onclick="sendMessage()">
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Profile Section -->
            <div id="profileSection" class="section-page hidden">
                <div class="page-title-tiny">
                    <i class="fas fa-user"></i> PROFILE
                </div>
                
                <div class="profile-card" id="profileCard"></div>
                
                <div class="page-title-tiny" style="margin-top: 20px;">
                    <i class="fas fa-rss"></i> MY POSTS
                </div>
                <div id="userPostsContainer"></div>
            </div>

            <!-- Edit Profile Modal -->
            <div id="editProfileModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Edit Profile</h2>
                        <button class="modal-close" onclick="hideEditProfileModal()">&times;</button>
                    </div>
                    
                    <!-- Avatar Preview -->
                    <div class="current-avatar" id="userAvatarPreview">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    
                    <!-- Avatar Selector -->
                    <div class="avatar-selector" id="userAvatarSelector"></div>
                    
                    <!-- Avatar Upload -->
                    <div style="margin-bottom: 15px;">
                        <button class="hamburger-icon" onclick="triggerAvatarUpload()" style="width: 100%; height: 40px;">
                            <i class="fas fa-upload"></i> Upload Custom Avatar
                        </button>
                        <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                    </div>
                    
                    <!-- Background Upload -->
                    <div style="margin-bottom: 15px;">
                        <button class="hamburger-icon" onclick="triggerBackgroundUpload()" style="width: 100%; height: 40px;">
                            <i class="fas fa-image"></i> Upload Cover Photo
                        </button>
                        <input type="file" id="backgroundInput" accept="image/*" style="display: none;">
                    </div>
                    
                    <div style="margin-bottom: 15px;">
                        <label style="color: var(--text-soft);">Name</label>
                        <input type="text" id="editName" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: var(--radius-full); color: white; margin-top: 5px;">
                    </div>
                    
                    <div style="margin-bottom: 15px;">
                        <label style="color: var(--text-soft);">Bio</label>
                        <textarea id="editBio" rows="3" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: var(--radius-lg); color: white; margin-top: 5px;"></textarea>
                    </div>
                    
                    <button class="upload-btn" style="width: 100%; height: 48px;" onclick="saveProfile()">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main JavaScript -->
    <script src="js/main.js"></script>
</body>
</html>
