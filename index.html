<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WAYNE • Loading</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Three.js for background (exactly like auth) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            background: #0a042e;
        }
        
        /* Three.js Canvas Background - exactly like auth */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        /* Main Container - exactly like auth */
        .loader-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        /* Glass Card - EXACT copy of auth card */
        .loader-card {
            width: 100%;
            max-width: 480px; /* Same as auth */
            background: rgba(10, 4, 46, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(48, 233, 255, 0.2);
            border-radius: 40px; /* Same as auth */
            padding: 50px 40px; /* Same as auth */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(48, 233, 255, 0.1) inset,
                        0 0 30px rgba(48, 233, 255, 0.2);
            text-align: center;
            position: relative;
        }
        
        /* Logo Section - EXACT copy of auth */
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        
        .logo-section h1 {
            font-size: 4rem; /* Same as auth */
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #30e9ff, #a5b4ff, #fff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px; /* Same as auth */
            animation: gradientFlow 8s ease infinite;
            text-shadow: 0 0 30px rgba(48, 233, 255, 0.5);
            margin-bottom: 10px;
        }
        
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .logo-section p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem; /* Same as auth */
            letter-spacing: 4px; /* Same as auth */
            text-transform: uppercase;
            margin-top: 10px;
            position: relative;
            display: inline-block;
        }
        
        .logo-section p::before,
        .logo-section p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30px; /* Same as auth */
            height: 1px;
            background: linear-gradient(90deg, transparent, #30e9ff, transparent);
        }
        
        .logo-section p::before {
            left: -40px; /* Same as auth */
        }
        
        .logo-section p::after {
            right: -40px; /* Same as auth */
        }
        
        /* Loading Text - styled like auth tabs */
        .loading-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 40px; /* Same as auth tabs margin */
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 60px;
            border: 1px solid rgba(48, 233, 255, 0.2);
        }
        
        .loading-tab {
            flex: 1;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            font-weight: 600;
            padding: 14px 20px;
            border-radius: 50px;
            cursor: default;
            transition: all 0.4s;
            letter-spacing: 1px;
        }
        
        .loading-tab.active {
            background: linear-gradient(135deg, #30e9ff, #0d0551);
            color: white;
            box-shadow: 0 10px 20px rgba(48, 233, 255, 0.3);
        }
        
        /* Message Area - styled like auth forms */
        .message-area {
            margin-bottom: 25px; /* Same as auth input margin */
        }
        
        .loading-message {
            color: #30e9ff;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            padding: 16px 20px; /* Same as auth input padding */
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(48, 233, 255, 0.2);
            border-radius: 30px; /* Same as auth input */
            display: flex;
            align-items: center;
            gap: 12px;
            animation: messagePulse 2s infinite;
        }
        
        @keyframes messagePulse {
            0%, 100% { border-color: rgba(48, 233, 255, 0.2); }
            50% { border-color: #30e9ff; box-shadow: 0 0 20px rgba(48, 233, 255, 0.3); }
        }
        
        .loading-message i {
            color: #30e9ff;
            font-size: 1.2rem;
            animation: spin 2s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Stats Container - styled like auth buttons */
        .stats-container {
            display: flex;
            gap: 15px;
            margin: 30px 0 20px;
        }
        
        .stat-item {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(48, 233, 255, 0.2);
            border-radius: 30px; /* Same as auth button */
            padding: 16px 10px; /* Same as auth button padding */
            transition: all 0.4s;
        }
        
        .stat-item:hover {
            border-color: #30e9ff;
            box-shadow: 0 10px 20px rgba(48, 233, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #30e9ff;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(48, 233, 255, 0.5);
        }
        
        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        /* Progress Bar - styled like auth input */
        .progress-container {
            margin: 30px 0 20px;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px; /* Same as auth input */
            overflow: hidden;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #30e9ff, #a5b4ff);
            border-radius: 30px;
            animation: progress 2.5s ease-in-out forwards;
            box-shadow: 0 0 20px #30e9ff;
        }
        
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        
        /* Loading Dots - styled like auth text */
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: #30e9ff;
            border-radius: 50%;
            animation: dotPulse 1.5s ease-in-out infinite;
        }
        
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes dotPulse {
            0%, 60%, 100% { transform: scale(1); opacity: 0.5; }
            30% { transform: scale(1.5); opacity: 1; }
        }
        
        /* Social Icons - exactly like auth */
        .social-section {
            margin-top: 30px;
            text-align: center;
            position: relative;
        }
        
        .social-section::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(48, 233, 255, 0.3), transparent);
        }
        
        .social-section p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        
        .social-icons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .social-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(48, 233, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: default;
            transition: all 0.4s;
        }
        
        .social-icon:hover {
            background: #30e9ff;
            color: #0d0551;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(48, 233, 255, 0.4);
        }
        
        /* Version Badge - styled like auth links */
        .version-badge {
            position: absolute;
            bottom: 20px;
            right: 30px;
            color: rgba(48, 233, 255, 0.5);
            font-size: 0.8rem;
            letter-spacing: 2px;
            z-index: 2;
            padding: 5px 15px;
            background: rgba(48, 233, 255, 0.1);
            border-radius: 30px;
            border: 1px solid rgba(48, 233, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        
        /* Auth Link style (back to login style) */
        .auth-link {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: default;
            margin-top: 15px;
        }
        
        .auth-link i {
            color: #30e9ff;
            font-size: 0.9rem;
        }
        
        /* Responsive - same as auth */
        @media (max-width: 480px) {
            .loader-card {
                padding: 30px 20px;
            }
            
            .logo-section h1 {
                font-size: 3rem;
            }
            
            .stats-container {
                flex-direction: column;
                gap: 10px;
            }
            
            .version-badge {
                bottom: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Three.js Canvas - exactly like auth -->
    <canvas id="canvas-bg"></canvas>
    
    <!-- Version Badge -->
    <div class="version-badge">
        <i class="fas fa-code-branch" style="margin-right: 5px;"></i> v2.0.0
    </div>
    
    <div class="loader-wrapper">
        <div class="loader-card">
            <!-- Logo Section - exactly like auth -->
            <div class="logo-section">
                <h1>WAYNE</h1>
                <p>SOCIAL COMMUNITY</p>
            </div>
            
            <!-- Loading Tabs (like auth tabs) -->
            <div class="loading-tabs">
                <div class="loading-tab active">LOADING</div>
                <div class="loading-tab">EXPERIENCE</div>
                <div class="loading-tab">READY</div>
            </div>
            
            <!-- Loading Message (like auth input) -->
            <div class="message-area">
                <div class="loading-message">
                    <i class="fas fa-cog"></i>
                    <span>Loading your social world...</span>
                </div>
            </div>
            
            <!-- Stats Container (like auth buttons) -->
            <div class="stats-container">
                <div class="stat-item">
                    <div class="stat-value" id="userCount">688</div>
                    <div class="stat-label">MEMBERS</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="postCount">188</div>
                    <div class="stat-label">POSTS</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="groupCount">30</div>
                    <div class="stat-label">GROUPS</div>
                </div>
            </div>
            
            <!-- Progress Bar (styled like auth input) -->
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            
            <!-- Loading Dots -->
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            
            <!-- Social Icons - exactly like auth -->
            <div class="social-section">
                <p>Or continue with</p>
                <div class="social-icons">
                    <div class="social-icon"><i class="fab fa-google"></i></div>
                    <div class="social-icon"><i class="fab fa-github"></i></div>
                    <div class="social-icon"><i class="fab fa-facebook-f"></i></div>
                </div>
            </div>
            
            <!-- Auth Link style (back to login style) -->
            <div class="auth-link">
                <i class="fas fa-arrow-left"></i> Welcome to WAYNE
            </div>
        </div>
    </div>

    <script>
        // =====================================================
        // THREE.JS BACKGROUND - Exactly like auth
        // =====================================================
        
        const canvas = document.getElementById('canvas-bg');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a042e);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        // Single layer particles - exactly like auth
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 2000;
        const posArray = new Float32Array(particlesCount * 3);
        const colorArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i += 3) {
            // Position
            posArray[i] = (Math.random() - 0.5) * 100;
            posArray[i+1] = (Math.random() - 0.5) * 100;
            posArray[i+2] = (Math.random() - 0.5) * 100;
            
            // Color - exactly like auth
            const color = new THREE.Color();
            if(Math.random() > 0.5) {
                color.setHSL(0.6 + Math.random() * 0.2, 0.8, 0.5); // Blues
            } else {
                color.setHSL(0.8 + Math.random() * 0.1, 0.8, 0.5); // Purples
            }
            
            colorArray[i] = color.r;
            colorArray[i+1] = color.g;
            colorArray[i+2] = color.b;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
        
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });
        
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);
        
        camera.position.z = 30;
        
        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.0002;
            particlesMesh.rotation.x += 0.0001;
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // =====================================================
        // LOADER ANIMATIONS
        // =====================================================
        
        // Animate stats counter
        function animateValue(element, start, end, duration) {
            const range = end - start;
            const increment = range / (duration / 16);
            let current = start;
            
            const timer = setInterval(() => {
                current += increment;
                if (current >= end) {
                    current = end;
                    clearInterval(timer);
                }
                element.textContent = Math.floor(current);
            }, 16);
        }
        
        setTimeout(() => {
            animateValue(document.getElementById('userCount'), 0, 688, 2000);
            animateValue(document.getElementById('postCount'), 0, 188, 2000);
            animateValue(document.getElementById('groupCount'), 0, 30, 2000);
        }, 500);
        
        // =====================================================
        // REDIRECT TO AUTH PAGE
        // =====================================================
        
        setTimeout(() => {
            window.location.href = 'main/index.html';
        }, 3000);
    </script>
</body>
</html>
